<svg xmlns="http://www.w3.org/2000/svg" width="980" height="990" viewBox="0 0 980 990" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="980" height="990" fill="#11151c"/>
  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#eef3f9">Mayans VIP — Spot &amp; Wash Positions</text>
  <text x="490" y="58" text-anchor="middle" font-size="12" fill="#9fb0c2">Top-down plan view (matches QLC+ Fixture Monitor) · grid squares = 1 m (room 5 × 5 m) · origin top-left, X → right, Y → down</text>

  <!-- grid -->
  <g stroke="#26303d" stroke-width="1">
    <line x1="90" y1="80" x2="90" y2="880"/>
    <line x1="250" y1="80" x2="250" y2="880"/>
    <line x1="410" y1="80" x2="410" y2="880"/>
    <line x1="570" y1="80" x2="570" y2="880"/>
    <line x1="730" y1="80" x2="730" y2="880"/>
    <line x1="890" y1="80" x2="890" y2="880"/>
    <line x1="90" y1="80" x2="890" y2="80"/>
    <line x1="90" y1="240" x2="890" y2="240"/>
    <line x1="90" y1="400" x2="890" y2="400"/>
    <line x1="90" y1="560" x2="890" y2="560"/>
    <line x1="90" y1="720" x2="890" y2="720"/>
    <line x1="90" y1="880" x2="890" y2="880"/>
  </g>
  <rect x="90" y="80" width="800" height="800" fill="none" stroke="#3a4654" stroke-width="2"/>
  <g fill="#6b7a8c" font-size="10">
    <text x="90" y="72" text-anchor="middle">0</text>
    <text x="250" y="72" text-anchor="middle">1m</text>
    <text x="410" y="72" text-anchor="middle">2m</text>
    <text x="570" y="72" text-anchor="middle">3m</text>
    <text x="730" y="72" text-anchor="middle">4m</text>
    <text x="890" y="72" text-anchor="middle">5m</text>
    <text x="82" y="84" text-anchor="end">0</text>
    <text x="82" y="244" text-anchor="end">1m</text>
    <text x="82" y="404" text-anchor="end">2m</text>
    <text x="82" y="564" text-anchor="end">3m</text>
    <text x="82" y="724" text-anchor="end">4m</text>
    <text x="82" y="884" text-anchor="end">5m</text>
  </g>

  <!-- washes (cyan squares) -->
  <g>
    <rect x="135" y="350" width="32" height="24" rx="5" fill="#25c0d6" stroke="#0b3b42" stroke-width="1.5"/>
    <text x="151" y="366" text-anchor="middle" font-size="11" font-weight="bold" fill="#08222a">W1</text>
    <rect x="126" y="141" width="32" height="24" rx="5" fill="#25c0d6" stroke="#0b3b42" stroke-width="1.5"/>
    <text x="142" y="157" text-anchor="middle" font-size="11" font-weight="bold" fill="#08222a">W2</text>
    <rect x="763" y="343" width="32" height="24" rx="5" fill="#25c0d6" stroke="#0b3b42" stroke-width="1.5"/>
    <text x="779" y="359" text-anchor="middle" font-size="11" font-weight="bold" fill="#08222a">W3</text>
    <rect x="761" y="137" width="32" height="24" rx="5" fill="#25c0d6" stroke="#0b3b42" stroke-width="1.5"/>
    <text x="777" y="153" text-anchor="middle" font-size="11" font-weight="bold" fill="#08222a">W4</text>
  </g>

  <!-- spots (gold circles; ring colour = variant) -->
  <g font-weight="bold" fill="#15110a">
    <!-- base BEAM230 -->
    <circle cx="454" cy="566" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="454" y="570" text-anchor="middle" font-size="12">2</text>
    <circle cx="347" cy="676" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="347" y="680" text-anchor="middle" font-size="12">3</text>
    <circle cx="570" cy="673" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="570" y="677" text-anchor="middle" font-size="12">4</text>
    <circle cx="381" cy="240" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="381" y="244" text-anchor="middle" font-size="12">5</text>
    <circle cx="635" cy="134" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="635" y="138" text-anchor="middle" font-size="12">6</text>
    <circle cx="629" cy="301" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="629" y="305" text-anchor="middle" font-size="12">7</text>
    <circle cx="307" cy="306" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="307" y="310" text-anchor="middle" font-size="12">8</text>
    <circle cx="522" cy="233" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="522" y="237" text-anchor="middle" font-size="12">9</text>
    <circle cx="327" cy="136" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="327" y="140" text-anchor="middle" font-size="10">10</text>
    <circle cx="182" cy="558" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="182" y="562" text-anchor="middle" font-size="10">11</text>
    <circle cx="758" cy="548" r="13" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/><text x="758" y="552" text-anchor="middle" font-size="10">12</text>
    <!-- V2 (id0 = #13): orange ring -->
    <circle cx="337" cy="558" r="13" fill="#ffb02e" stroke="#ff7a00" stroke-width="3"/><text x="337" y="562" text-anchor="middle" font-size="10">13</text>
    <!-- V3 (id34 = #1, id35 = #14): green ring -->
    <circle cx="463" cy="793" r="13" fill="#ffb02e" stroke="#36d07a" stroke-width="3"/><text x="463" y="797" text-anchor="middle" font-size="12">1</text>
    <circle cx="571" cy="563" r="13" fill="#ffb02e" stroke="#36d07a" stroke-width="3"/><text x="571" y="567" text-anchor="middle" font-size="10">14</text>
  </g>

  <!-- legend -->
  <g font-size="12" fill="#cdd8e4">
    <circle cx="108" cy="924" r="11" fill="#ffb02e" stroke="#1b2430" stroke-width="1.5"/>
    <text x="126" y="928">Spot (BEAM230)</text>
    <circle cx="290" cy="924" r="11" fill="#ffb02e" stroke="#36d07a" stroke-width="3"/>
    <text x="308" y="928">V3 — #1 &amp; #14</text>
    <circle cx="470" cy="924" r="11" fill="#ffb02e" stroke="#ff7a00" stroke-width="3"/>
    <text x="488" y="928">V2 — #13</text>
    <rect x="612" y="914" width="28" height="20" rx="5" fill="#25c0d6" stroke="#0b3b42" stroke-width="1.5"/>
    <text x="650" y="928">Wash (W1–W4)</text>
  </g>
  <text x="490" y="966" text-anchor="middle" font-size="11" fill="#6b7a8c">Spots numbered by BEAM230 # (id: #1=34, #2-#8=1-7, #9-#12=12-15, #13=0/V2, #14=35/V3) · Washes W1-W4 = id 8-11</text>
</svg>
